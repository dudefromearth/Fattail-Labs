        Submits the URLs for the required training footage and consent statement
        to create a Digital Twin.
      operationId: submit-video-avatar-creation-request
      tags:
        - Digital Twins
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
