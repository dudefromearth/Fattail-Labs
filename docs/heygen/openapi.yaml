                  type: string
                  description: >-
                    The ID of the avatar's pose. You can specify this field from
                    the response of avatar.list API
                  default: Vanessa-invest-20220722
                avatar_style:
                  type: string
                  description: >-
                    The style of the avatar. Can be "normal" or other styles
                    supported by the API. 'circle', 'closeUp', 'normal',
                    'voiceOnly'.
                  default: normal
                  enum:
                    - normal
                    - closeUp
                input_text:
                  type: string
                  description: The text that the avatar will speak in the video.
                  default: This is a WebM video generated by HeyGen API
                voice_id:
                  type: string
                  description: The ID of the voice that the avatar will use.
                  default: 1bd001e7e50f421d891986aad5158bc8
                input_audio:
                  type: string
                  description: >-
                    input audio url. Specify either input_text/voice_id or
                    input_audio.
                dimension:
                  type: object
                  description: >-
                    The dimensions of the output video will be scaled by the
                    height of the original avatar size.
