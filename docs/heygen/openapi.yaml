openapi: 3.1.0
info:
  title: HeyGen API
  version: 4.0.8
  description: >-
    OpenAPI specification for the HeyGen API endpoints referenced across the
    documentation.
servers:
  - url: https://api.heygen.com
components:
  securitySchemes:
    sec0:
      type: apiKey
      in: header
      name: x-api-key
      x-default: <your-api-key>
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
security:
  - ApiKeyAuth: []
paths:
  /v1/video_status.get:
    get:
      summary: Retrieve Video Status/Details
      description: >-
        This endpoint allows you to retrieve the status and details of a
        specific video.
      operationId: video-status
      parameters:
        - name: video_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: |-
                    {
                      "code": 400,
                      "message": "Invlid parameters"
                    }
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 400
                    default: 0
                  message:
                    type: string
                    example: Invlid parameters
      deprecated: false
      x-mint:
        href: /reference/video-status
      tags:
        - Videos
      security:
        - ApiKeyAuth: []
  /v1/webhook/endpoint.list:
    get:
      summary: List Webhook Endpoints
      description: list all your registered webhook endpoints
      operationId: list-webhook-endpoints
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: >-
                    {"code": 100, "data": [{"status": "enabled", "username":
                    "1233456789", "created_at": "2023-04-03T03:25:54", "url":
                    "https://helloworld.com", "events": null, "endpoint_id":
                    "6981dc2e59944a4ba195bcc1dd3be1af", "secret":
                    "whsec_aZUbuN_UAC1zzuuYr_QVHA=="}, {"status": "enabled",
                    "username": "bcbb0a7445354c34a5bd5870d7bb30a0",
                    "created_at": "2023-04-03T03:25:54", "url":
                    "https://craft-api.surreal-ai.com/v1/webhook/callback.test",
                    "events": null, "endpoint_id":
                    "fdfbea36e773416ea6acb5e1123079f6", "secret":
                    "whsec_12345435346534"}], "msg": null}
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 100
                    default: 0
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        status:
                          type: string
                          example: enabled
                        username:
                          type: string
                          example: '1233456789'
                        created_at:
                          type: string
                          example: '2023-04-03T03:25:54'
                        url:
                          type: string
                          example: https://helloworld.com
                        events: {}
                        endpoint_id:
                          type: string
                          example: 6981dc2e59944a4ba195bcc1dd3be1af
                        secret:
                          type: string
                          example: whsec_aZUbuN_UAC1zzuuYr_QVHA==
                  msg: {}
      deprecated: false
      x-mint:
        href: /reference/list-webhook-endpoints
      tags:
        - Webhooks
      security:
        - ApiKeyAuth: []
  /v1/webhook/endpoint.add:
    post:
      summary: Add a Webhook Endpoint
      description: ''
      operationId: add-a-webhook-endpoint
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: The URL where you will receive events from HeyGen.
                events:
                  type: array
                  description: >-
                    The events that your URL is set to receive. `None` means all
                    events. You can see supported events at
                    [`/v1/webhook/webhook.list`](https://docs.heygen.com/reference/list-available-webhook-events).
                  items:
                    type: string
                entity_id:
                  type: string
                  description: >-
                    Optional. The specific entity ID associated with the
                    webhook. eg. video_id,project_id
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: >-
                    {"code": 100, "data": {"endpoint_id":
                    "038fb5f9a62d48e5af08834d20404606", "username": "123456",
                    "url": "https://helloworld.com", "status": "enabled",
                    "events": null, "secret": "whsec_123456", "created_at":
                    "2023-04-03T05:40:46.769845"}, "msg": null}
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 100
                    default: 0
                  data:
                    type: object
                    properties:
                      endpoint_id:
                        type: string
                        example: 038fb5f9a62d48e5af08834d20404606
                      username:
                        type: string
                        example: '123456'
                      url:
                        type: string
                        example: https://helloworld.com
                      status:
                        type: string
                        example: enabled
                      events: {}
                      secret:
                        type: string
                        example: whsec_123456
                      created_at:
                        type: string
                        example: '2023-04-03T05:40:46.769845'
                  msg: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: >-
                    {"code":400542,"message":"Url of this webhook endpoint is
                    invalid"}
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 400542
                    default: 0
                  message:
                    type: string
                    example: Url of this webhook endpoint is invalid
      deprecated: false
      x-mint:
        href: /reference/add-a-webhook-endpoint
      tags:
        - Webhooks
      security:
        - ApiKeyAuth: []
  /v2/avatars:
    get:
      summary: List All Avatars (V2)
      description: >-
        You can get your Avatars and Talking Photos(Photo Avatars) with this
        endpoint.
      operationId: list-avatars-v2
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-mint:
        href: /reference/list-avatars-v2
      tags:
        - Avatars
      security:
        - ApiKeyAuth: []
  /v1/video.delete:
    delete:
      summary: Delete a Video
      description: ''
      operationId: delete-a-video
      parameters:
        - name: video_id
          in: query
          description: id of the video you want to delete
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: '{"code": 100, "data": null, "msg": null}'
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 100
                    default: 0
                  data: {}
                  msg: {}
        '404':
          description: '404'
          content:
            application/json:
              examples:
                Result:
                  value: '{"code":40104,"message":"Video not found"}'
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 40104
                    default: 0
                  message:
                    type: string
                    example: Video not found
      deprecated: false
      x-mint:
        href: /reference/delete-a-video
      tags:
        - Videos
      security:
        - ApiKeyAuth: []
  /v2/video/generate:
    post:
      summary: Create Avatar Video (V2)
      description: This API now generates videos with our New AI Studio backend.
      operationId: create-an-avatar-video-v2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - dimension
                - video_inputs
              properties:
                caption:
                  type: boolean
                  description: Whether to add a caption to the video.
                  default: false
                title:
                  type: string
                  description: Title of this video
                callback_id:
                  type: string
                  description: A custom ID for callback purposes.
                dimension:
                  type: object
                  properties:
                    width:
                      type: integer
                      default: 1280
                      format: int32
                    height:
                      type: integer
                      default: 720
                      format: int32
                video_inputs:
                  type: array
                  items:
                    properties:
                      character:
                        type: object
                        description: Could be an `avatar` or `talking photo`.
                        properties:
                          type:
                            type: string
                            description: >-
                              Could be either `avatar` or `talking_photo`(for
                              photo avatars).
                            default: avatar
                            enum:
                              - avatar
                              - talking_photo
                          avatar_id:
                            type: string
                            description: Provide either `avatar_id` or `talking_photo_id`.
                          talking_photo_id:
                            type: string
                            description: Provide either `avatar_id` or `talking_photo_id`.
                          scale:
                            type: number
                            description: >-
                              _applies to both `avatar` and `talking_photo`
                              type._
                            default: 1
                            format: float
                          avatar_style:
                            type: string
                            description: _applies to this `avatar` type._
                            default: normal
                            enum:
                              - circle
                              - closeUp
                              - normal
                          offset:
                            type: object
                            description: >-
                              _applies to both `avatar` and `talking_photo`
                              type._
                            properties:
                              x:
                                type: number
                                format: float
                              'y':
                                type: number
                                format: float
                          matting:
                            type: string
                            description: >-
                              _applies to both `avatar` and `talking_photo`
                              type._
                          circle_background_color:
                            type: string
                            description: >-
                              _applies to both `avatar` and `talking_photo`
                              type._
                          talking_photo_style:
                            type: string
                            description: _applies to this `talking_photo` type._
                          talking_style:
                            type: string
                            description: _applies to this `talking_photo` type._
                            enum:
                              - stable
                              - expressive
                          expression:
                            type: string
                            description: _applies to this `talking_photo` type._
                            enum:
                              - default
                              - happy
                          super_resolution:
                            type: string
                            description: _applies to this `talking_photo` type._
                      voice:
                        type: object
                        description: >-
                          could be TextVoiceSettings or AudioVoiceSettings or
                          SilenceVoiceSettings
                        properties:
                          type:
                            type: string
                            description: must be text
                          voice_id:
                            type: string
                            description: voice id
                          input_text:
                            type: string
                            description: script to drive the voice
                          speed:
                            type: number
                            description: >-
                              Voice speed, value between 0.5 and 1.5. Default is
                              1.
                            format: float
                          pitch:
                            type: integer
                            description: >-
                              Voice pitch, value between -50 and 50. Default is
                              0.
                            format: int32
                          emotion:
                            type: string
                            description: Voice emotion, if voice support emotion.
                            enum:
                              - Excited
                              - Friendly
                              - Serious
                              - Soothing
                              - Broadcaster
                          locale:
                            type: string
                            description: >-
                              Allows to specify voice accents/locales for
                              multilingual voices. (e.g., en-US, en-IN, pt-PT,
                              pt-BR )
                      background:
                        type: object
                        description: >-
                          could be ColorBackground, ImageBackground or
                          VideoBackground
                        properties:
                          type:
                            type: string
                            description: could be `color`, `image`, `video`
                            enum:
                              - color
                              - image
                              - video
                          value:
                            type: string
                            description: _applies to `color` type._
                          '':
                            type: string
                    type: object
                folder_id:
                  type: string
                  description: Allows them to specify the video output folder destination.
                callback_url:
                  type: string
                  description: A custom curl for callback
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-mint:
        href: /reference/create-an-avatar-video-v2
      tags:
        - Videos
      security:
        - ApiKeyAuth: []
  /v1/webhook/endpoint.update:
    patch:
      summary: Update a Webhook Endpoint
      description: update an existing webhook endpoint
      operationId: update-a-webhook-endpoint
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint_id:
                  type: string
                  description: the endpoint's id you want to update
                url:
                  type: string
                  description: the new post url you want to set for the endpoint
                events:
                  type: array
                  description: the new events array you want to set for your endpoint
                  items:
                    type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: >-
                    {"code": 100, "data": {"endpoint_id": "123456", "url":
                    "https://helloworld.com", "secret": "whsec_123456",
                    "status": "enabled", "events": null, "username": "123456",
                    "created_at": "2023-04-03T05:40:47"}, "msg": null}
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 100
                    default: 0
                  data:
                    type: object
                    properties:
                      endpoint_id:
                        type: string
                        example: '123456'
                      url:
                        type: string
                        example: https://helloworld.com
                      secret:
                        type: string
                        example: whsec_123456
                      status:
                        type: string
                        example: enabled
                      events: {}
                      username:
                        type: string
                        example: '123456'
                      created_at:
                        type: string
                        example: '2023-04-03T05:40:47'
                  msg: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: >-
                    {"code":400542,"message":"Url of this webhook endpoint is
                    invalid"}
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 400542
                    default: 0
                  message:
                    type: string
                    example: Url of this webhook endpoint is invalid
        '404':
          description: '404'
          content:
            text/plain:
              examples:
                Result:
                  value: '{"code":400131,"message":"Webhook endpoint not found"}'
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 400131
                    default: 0
                  message:
                    type: string
                    example: Webhook endpoint not found
      deprecated: false
      x-mint:
        href: /reference/update-a-webhook-endpoint
      tags:
        - Webhooks
      security:
        - ApiKeyAuth: []
  /v1/webhook/endpoint.delete:
    delete:
